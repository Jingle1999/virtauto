name: Governance Required Checks

on:
  pull_request:
    paths:
      - "ops/contracts/**"
      - "ops/decisions/**"
      - "ops/reports/**"

permissions:
  contents: read

jobs:

  validate_contract:

    uses: ./.github/workflows/_governance_template.yml

    with:

      runtime: python

      install: |
        pip install jsonschema

      run: |
        python ops/validate_contract_v1.py ops/contracts/george_contract_v1.json ops/contracts/schemas/george_contract_v1.schema.json


  validate_decision_trace:

    uses: ./.github/workflows/_governance_template.yml

    with:

      runtime: python

      run: |
        python ops/validate_decision_trace.py


  validate_pr_decision_trace:

    uses: ./.github/workflows/_governance_template.yml

    with:

      runtime: python

      run: |
        python ops/validate_pr_decision_trace.py


  validate_status:

    uses: ./.github/workflows/_governance_template.yml

    with:

      runtime: python

      run: |
        python ops/validate_status.py
