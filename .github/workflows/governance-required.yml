name: Governance Required Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: governance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate_contract_v1:
    name: validate_contract_v1 (pull_request)
    uses: ./.github/workflows/_governance_template.yml
    with:
      mode: "python"
      job_display_name: "validate_contract_v1 (pull_request)"
      runs_on: "ubuntu-24.04"
      python_version: "3.11"
      python_script: "ops/validate_contract_v1.py"
      python_args: ""
      timeout_minutes: 10

  validate_decision_trace:
    name: validate_decision_trace (pull_request)
    uses: ./.github/workflows/_governance_template.yml
    with:
      mode: "python"
      job_display_name: "validate_decision_trace (pull_request)"
      runs_on: "ubuntu-24.04"
      python_version: "3.11"
      python_script: "ops/validate_decision_trace.py"
      python_args: ""
      timeout_minutes: 10

  validate_pr_decision_trace:
    name: validate_pr_decision_trace (pull_request)
    uses: ./.github/workflows/_governance_template.yml
    with:
      mode: "python"
      job_display_name: "validate_pr_decision_trace (pull_request)"
      runs_on: "ubuntu-24.04"
      python_version: "3.11"
      python_script: "ops/validate_pr_decision_trace.py"
      python_args: ""
      timeout_minutes: 10

  validate_status:
    name: validate_status (pull_request)
    uses: ./.github/workflows/_governance_template.yml
    with:
      mode: "python"
      job_display_name: "validate_status (pull_request)"
      runs_on: "ubuntu-24.04"
      python_version: "3.11"
      python_script: "ops/validate_status.py"
      python_args: ""
      timeout_minutes: 10