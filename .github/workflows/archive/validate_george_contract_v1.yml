name: validate_george_contract_v1

on:
  pull_request:
    paths:
      - "ops/contracts/george_contract_v1.json"
      - "ops/contracts/schemas/george_contract_v1.schema.json"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  validate:
    name: validate_george_contract_v1
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install AJV
        run: |
          npm init -y >/dev/null 2>&1
          npm i ajv ajv-formats >/dev/null 2>&1

      - name: AJV validate contract against schema
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const Ajv = require('ajv');
          const addFormats = require('ajv-formats');

          const schemaPath = 'ops/contracts/schemas/george_contract_v1.schema.json';
          const contractPath = 'ops/contracts/george_contract_v1.json';

          const schema = JSON.parse(fs.readFileSync(schemaPath, 'utf8'));
          const contract = JSON.parse(fs.readFileSync(contractPath, 'utf8'));

          const ajv = new Ajv({ allErrors: true, strict: false });
          addFormats(ajv);

          const validate = ajv.compile(schema);
          const ok = validate(contract);

          if (!ok) {
            console.error('Schema validation failed:\n', validate.errors);
            process.exit(1);
          }
          console.log('Schema validation OK');
          NODE

      - name: Governance hard rules (v1)
        run: |
          node - <<'NODE'
          const fs = require('fs');

          const contractPath = 'ops/contracts/george_contract_v1.json';
          const c = JSON.parse(fs.readFileSync(contractPath, 'utf8'));

          const fail = (msg) => { console.error('CONTRACT HARD-RULE FAIL:', msg); process.exit(1); };

          // Identity / version gating
          if (c.contract_id !== 'george_contract_v1') fail('contract_id must be "george_contract_v1"');

          // v1 policy: default_mode MUST be HUMAN_GUARDED
          if (String(c.default_mode).toUpperCase() !== 'HUMAN_GUARDED') {
            fail('default_mode must be "HUMAN_GUARDED" in v1');
          }

          // Mode integrity
          if (!c.modes || !c.modes.HUMAN_GUARDED || !c.modes.NIGHT_SHIFT) fail('modes must include HUMAN_GUARDED and NIGHT_SHIFT');

          // HUMAN_GUARDED invariants
          const hg = c.modes.HUMAN_GUARDED;
          if (hg.can_apply !== false) fail('modes.HUMAN_GUARDED.can_apply must be false');
          if (hg.can_propose !== true) fail('modes.HUMAN_GUARDED.can_propose must be true');
          if (hg.requires_human_approval !== true) fail('modes.HUMAN_GUARDED.requires_human_approval must be true');

          // Truth sources must exist (strings) and be ops/ paths
          const ts = c.truth_sources || {};
          const must = ['system_status','decision_latest','decision_trace_stream'];
          for (const k of must) {
            if (typeof ts[k] !== 'string' || !ts[k].startsWith('ops/')) fail(`truth_sources.${k} must be a string starting with "ops/"`);
          }

          // denylist must include deploy_* in v1
          const deny = Array.isArray(c.action_policy?.denylist) ? c.action_policy.denylist : [];
          const hasDeploy = deny.some(d => String(d?.pattern || '') === 'deploy_*');
          if (!hasDeploy) fail('action_policy.denylist must include pattern "deploy_*" (v1)');

          console.log('Governance hard rules OK');
          NODE
