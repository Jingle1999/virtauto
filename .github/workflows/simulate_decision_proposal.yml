name: Governance Required Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: governance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  simulate_decision_proposal:
    name: simulate_decision_proposal (pull_request)
    uses: ./.github/workflows/_governance_template.yml
    with:
      mode: "python"
      job_display_name: "simulate_decision_proposal (pull_request)"
      runs_on: "ubuntu-24.04"
      python_version: "3.11.9"
      python_script: "ops/simulate_decision_proposal_v1.py"
      python_args: "ops/examples/decision_proposal_example_v1.json"
      artifact_name: "decision_trace_simulation"
      artifact_path: "/tmp/decision_trace.simulation.jsonl"
      timeout_minutes: 10
