name: self_audit

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["guardian", "status_monitoring"]
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: self-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  self_audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate self audit report
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          ts = datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")
          audit_id = "AUDIT-" + datetime.now(timezone.utc).strftime("%Y-%m-%d-%H%M%S")

          checks = []

          if os.path.exists("status/system_health.json"):
            checks.append("status_files_present")
          if os.path.exists("governance/decision_traces/GEORGE-example.json"):
            checks.append("decision_trace_present")
          if os.path.exists("governance/validation/GUARDIAN-example.json"):
            checks.append("validation_present")

          report = {
            "audit_id": audit_id,
            "system_status": "OK" if len(checks) == 3 else "PARTIAL",
            "checks": checks,
            "timestamp": ts
          }

          os.makedirs("audit", exist_ok=True)

          with open("audit/self_audit_report.json", "w", encoding="utf-8") as f:
            json.dump(report, f, indent=2)
          PY

      - name: Commit updated artifacts
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add audit/self_audit_report.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "audit: update self audit report"
          git push
