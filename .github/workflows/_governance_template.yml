name: governance-template

on:
  workflow_call:
    inputs:
      runtime:
        required: true
        type: string
      run:
        required: true
        type: string
      install:
        required: false
        type: string
        default: ""
      node_version:
        required: false
        type: string
        default: "20"
      python_version:
        required: false
        type: string
        default: "3.11"

permissions:
  contents: read

concurrency:
  group: governance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  governance:
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        if: inputs.runtime == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - name: Setup Python
        if: inputs.runtime == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install
        if: inputs.install != ''
        run: |
          set -euo pipefail
          ${{ inputs.install }}

      - name: Run
        run: |
          set -euo pipefail
          ${{ inputs.run }}
