name: status_monitoring

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

concurrency:
  group: status-monitoring-${{ github.ref }}
  cancel-in-progress: true

jobs:
  status_monitoring:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate status artifacts
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          ts = datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")

          os.makedirs("status", exist_ok=True)

          latest_decision_id = "GEORGE-unknown"
          if os.path.exists("status/latest_decision.json"):
            with open("status/latest_decision.json", "r", encoding="utf-8") as f:
              latest = json.load(f)
            latest_decision_id = latest.get("decision_id", latest_decision_id)

          latest_validation_id = "GUARDIAN-unknown"
          if os.path.exists("governance/validation/GUARDIAN-example.json"):
            with open("governance/validation/GUARDIAN-example.json", "r", encoding="utf-8") as f:
              validation = json.load(f)
            latest_validation_id = validation.get("validation_id", latest_validation_id)

          system_health = {
            "system": "virtauto",
            "health": "GREEN",
            "agents_running": 4,
            "last_update": ts
          }

          dashboard_summary = {
            "system_health": "GREEN",
            "latest_decision": latest_decision_id,
            "latest_validation": latest_validation_id,
            "audit_status": "OK"
          }

          with open("status/system_health.json", "w", encoding="utf-8") as f:
            json.dump(system_health, f, indent=2)

          with open("status/dashboard_summary.json", "w", encoding="utf-8") as f:
            json.dump(dashboard_summary, f, indent=2)
          PY

      - name: Commit updated artifacts
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add status/system_health.json status/dashboard_summary.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "status: update monitoring artifacts"
          git push
